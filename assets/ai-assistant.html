<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI 助手</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg-primary:#fff;--bg-secondary:#f7f7f8;--bg-card:#fff;--bg-input:#fff;
      --border:#e5e5e5;--text-primary:#1a1a1a;--text-secondary:#666;--text-muted:#999;
      --accent:#07c160;--accent-hover:#06ad56;--user-bubble:#07c160;--ai-bubble:#f0f0f0;
      --radius:18px;--sidebar-w:280px;
    }
    body.dark{
      --bg-primary:#1a1a1a;--bg-secondary:#2d2d2d;--bg-card:#262626;--bg-input:#2d2d2d;
      --border:#3d3d3d;--text-primary:#eaeaea;--text-secondary:#a0a0a0;--text-muted:#707070;
      --ai-bubble:#2d2d2d;
    }
    html,body{height:100%;background:var(--bg-primary);color:var(--text-primary);
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;overflow:hidden}

    /* 侧边栏 */
    .sidebar-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:200;display:none}
    .sidebar-overlay.active{display:block}
    .sidebar{position:fixed;top:0;left:0;width:var(--sidebar-w);height:100%;background:var(--bg-primary);
      z-index:201;transform:translateX(-100%);transition:transform .28s ease;display:flex;flex-direction:column;
      border-right:1px solid var(--border)}
    .sidebar.active{transform:translateX(0)}
    .sidebar-header{padding:20px 16px 12px;display:flex;align-items:center;justify-content:space-between;
      border-bottom:1px solid var(--border)}
    .sidebar-header span{font-size:18px;font-weight:700;color:var(--text-primary)}
    .sidebar-new{padding:6px 14px;background:var(--accent);color:#fff;border:none;border-radius:8px;
      font-size:13px;cursor:pointer}
    .sidebar-new:active{background:var(--accent-hover)}
    .sidebar-list{flex:1;overflow-y:auto;padding:8px 0}
    .sidebar-list::-webkit-scrollbar{width:0}
    .history-item{padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;
      transition:background .15s;border-bottom:1px solid var(--border)}
    .history-item:active{background:var(--bg-secondary)}
    .history-info{flex:1;min-width:0}
    .history-title{font-size:14px;font-weight:600;color:var(--text-primary);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .history-date{font-size:11px;color:var(--text-muted);margin-top:2px}
    .history-del{width:28px;height:28px;border-radius:50%;background:var(--bg-secondary);border:none;
      display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
    .history-del:active{background:#ff4444}
    .history-del svg{width:14px;height:14px;fill:var(--text-muted)}
    .history-del:active svg{fill:#fff}
    .sidebar-empty{padding:40px 20px;text-align:center;color:var(--text-muted);font-size:14px}

    /* 顶部栏 */
    .header{position:fixed;top:0;left:0;right:0;height:56px;background:var(--bg-primary);
      border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;
      padding:0 12px;z-index:100}
    .header-left,.header-right{display:flex;gap:8px;align-items:center}
    .h-btn{width:38px;height:38px;border-radius:50%;background:var(--bg-secondary);border:none;
      display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s}
    .h-btn:active{transform:scale(.92)}
    .h-btn svg{width:20px;height:20px;fill:var(--text-secondary)}
    .header-title{font-size:17px;font-weight:600;color:var(--text-primary);position:absolute;left:50%;
      transform:translateX(-50%)}

    /* 聊天区 */
    .chat-box{position:fixed;top:56px;left:0;right:0;bottom:108px;overflow-y:auto;padding:16px;
      background:var(--bg-secondary)}
    .chat-box::-webkit-scrollbar{width:0}

    /* 欢迎页 */
    .welcome{text-align:center;padding:50px 20px 30px}
    .welcome-icon{width:60px;height:60px;margin:0 auto 18px;background:linear-gradient(135deg,#07c160,#04a554);
      border-radius:18px;display:flex;align-items:center;justify-content:center}
    .welcome-icon svg{width:32px;height:32px;fill:#fff}
    .welcome h2{font-size:21px;font-weight:700;margin-bottom:6px}
    .welcome p{font-size:14px;color:var(--text-secondary);line-height:1.6;margin-bottom:28px}
    .tips{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:380px;margin:0 auto}
    .tip{background:var(--bg-card);border-radius:var(--radius);padding:14px;text-align:left;
      cursor:pointer;transition:transform .15s;border:1px solid var(--border)}
    .tip:active{transform:scale(.97);background:var(--bg-secondary)}
    .tip-ico{width:30px;height:30px;background:linear-gradient(135deg,#07c16018,#04a55408);
      border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
    .tip-ico svg{width:16px;height:16px;fill:var(--accent)}
    .tip-t{font-size:14px;font-weight:600;margin-bottom:3px}
    .tip-d{font-size:12px;color:var(--text-muted);line-height:1.4}

    /* 消息 */
    .msg{display:flex;margin-bottom:18px;animation:fadeUp .3s ease}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .msg.user{flex-direction:row-reverse}
    .msg-av{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;
      align-items:center;justify-content:center;margin:0 8px}
    .msg.ai .msg-av{background:linear-gradient(135deg,#07c160,#04a554)}
    .msg.user .msg-av{background:var(--bg-secondary)}
    .msg-av svg{width:18px;height:18px}
    .msg.user .msg-av svg{fill:var(--text-secondary)}
    .msg.ai .msg-av svg{fill:#fff}
    .msg-body{max-width:78%;min-width:50px}
    .msg-bubble{padding:11px 15px;border-radius:var(--radius);font-size:15px;line-height:1.65;
      word-break:break-word;white-space:pre-wrap}
    .msg.ai .msg-bubble{background:var(--ai-bubble);color:var(--text-primary);border-bottom-left-radius:4px}
    .msg.user .msg-bubble{background:var(--user-bubble);color:#fff;border-bottom-right-radius:4px}

    /* 打字动画 */
    .typing{display:flex;gap:5px;padding:6px 0}
    .typing i{width:7px;height:7px;background:var(--text-muted);border-radius:50%;
      animation:tBounce 1.4s infinite ease-in-out}
    .typing i:nth-child(2){animation-delay:.16s}
    @keyframes tBounce{0%,80%,100%{transform:scale(.5);opacity:.4}40%{transform:scale(1);opacity:1}}

    /* 底部输入 */
    .input-area{position:fixed;bottom:0;left:0;right:0;background:var(--bg-primary);
      border-top:1px solid var(--border);padding:8px 12px;padding-bottom:max(8px,env(safe-area-inset-bottom));z-index:100}
    .func-bar{display:flex;gap:8px;padding:4px 0 8px;overflow-x:auto;scrollbar-width:none}
    .func-bar::-webkit-scrollbar{display:none}
    .func-chip{flex-shrink:0;padding:5px 12px;background:var(--bg-secondary);border:1px solid var(--border);
      border-radius:14px;font-size:12px;color:var(--text-secondary);cursor:pointer;transition:all .15s;white-space:nowrap}
    .func-chip:active{background:var(--accent);color:#fff;border-color:var(--accent)}
    .model-bar{display:flex;gap:6px;padding:0 0 6px;overflow-x:auto;scrollbar-width:none;align-items:center}
    .model-bar::-webkit-scrollbar{display:none}
    .model-label{flex-shrink:0;font-size:12px;color:var(--text-muted);margin-right:2px}
    .model-chip{flex-shrink:0;padding:4px 10px;background:var(--bg-secondary);border:1.5px solid var(--border);
      border-radius:12px;font-size:12px;color:var(--text-secondary);cursor:pointer;transition:all .15s;white-space:nowrap}
    .model-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    .model-chip:active{transform:scale(.95)}
    .input-row{display:flex;align-items:flex-end;gap:8px;background:var(--bg-input);
      border:1px solid var(--border);border-radius:22px;padding:6px 6px 6px 14px}
    .input-row:focus-within{border-color:var(--accent)}
    .input-field{flex:1;border:none;background:transparent;font-size:16px;color:var(--text-primary);
      resize:none;max-height:110px;min-height:24px;line-height:1.5;outline:none}
    .input-field::placeholder{color:var(--text-muted)}
    .i-btn{width:34px;height:34px;border-radius:50%;background:var(--bg-secondary);border:none;
      display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:transform .15s}
    .i-btn:active{transform:scale(.88)}
    .i-btn svg{width:17px;height:17px;fill:var(--text-secondary)}
    .send-btn{background:var(--accent)}
    .send-btn:active{background:var(--accent-hover)}
    .send-btn svg{fill:#fff}
    .send-btn:disabled{background:var(--bg-secondary);cursor:not-allowed}
    .send-btn:disabled svg{fill:var(--text-muted)}
  </style>
</head>
<body>

<!-- 侧边栏遮罩 -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<!-- 侧边栏 -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <span>聊天记录</span>
    <button class="sidebar-new" onclick="newChat()">新建对话</button>
  </div>
  <div class="sidebar-list" id="historyList"></div>
</div>

<!-- 顶部栏 -->
<div class="header">
  <div class="header-left">
    <button class="h-btn" onclick="openSidebar()">
      <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
    </button>
  </div>
  <div class="header-title">AI 助手</div>
  <div class="header-right">
    <button class="h-btn" onclick="clearCurrentChat()">
      <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
    </button>
    <button class="h-btn" onclick="toggleTheme()">
      <svg viewBox="0 0 24 24" id="themeIcon"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>
    </button>
  </div>
</div>

<!-- 聊天区域 -->
<div class="chat-box" id="chatBox">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
    </div>
    <h2>我是 AI 助手</h2>
    <p>可以帮你解答问题、总结网页、对比多个网站<br>发送网址或直接提问即可开始</p>
    <div class="tips">
      <div class="tip" onclick="insertText('请帮我总结这个网页的内容：https://example.com')">
        <div class="tip-ico"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zm4 18H6V4h7v5h5v11z"/></svg></div>
        <div class="tip-t">总结网页</div>
        <div class="tip-d">发送网址，帮你总结内容</div>
      </div>
      <div class="tip" onclick="insertText('请帮我把 example.com 和 test.com 网站进行对比')">
        <div class="tip-ico"><svg viewBox="0 0 24 24"><path d="M10 3H4a1 1 0 00-1 1v6a1 1 0 001 1h6a1 1 0 001-1V4a1 1 0 00-1-1zM9 9H5V5h4v4zm11-6h-6a1 1 0 00-1 1v6a1 1 0 001 1h6a1 1 0 001-1V4a1 1 0 00-1-1zm-1 6h-4V5h4v4zm-9 4H4a1 1 0 00-1 1v6a1 1 0 001 1h6a1 1 0 001-1v-6a1 1 0 00-1-1zm-1 6H5v-4h4v4zm11-6h-6a1 1 0 00-1 1v6a1 1 0 001 1h6a1 1 0 001-1v-6a1 1 0 00-1-1zm-1 6h-4v-4h4v4z"/></svg></div>
        <div class="tip-t">对比网页</div>
        <div class="tip-d">输入域名，对比多个网站</div>
      </div>
      <div class="tip" onclick="insertText('什么是人工智能？')">
        <div class="tip-ico"><svg viewBox="0 0 24 24"><path d="M21 10.12h-6.78l2.74-2.82c-2.73-2.7-7.15-2.8-9.88-.1-2.73 2.71-2.73 7.08 0 9.79 2.73 2.71 7.15 2.71 9.88 0C18.32 15.65 19 14.08 19 12.1h2c0 1.98-.88 4.55-2.64 6.29-3.51 3.48-9.21 3.48-12.72 0-3.5-3.47-3.53-9.11-.02-12.58 3.51-3.47 9.14-3.47 12.65 0L21 3v7.12z"/></svg></div>
        <div class="tip-t">智能问答</div>
        <div class="tip-d">随时提问任何问题</div>
      </div>
      <div class="tip" onclick="insertText('帮我写一段Python代码')">
        <div class="tip-ico"><svg viewBox="0 0 24 24"><path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg></div>
        <div class="tip-t">代码助手</div>
        <div class="tip-d">帮你写代码和调试</div>
      </div>
    </div>
  </div>
  <div id="msgList"></div>
</div>

<!-- 底部输入区 -->
<div class="input-area">
  <div class="model-bar">
    <span class="model-label">模型:</span>
    <div class="model-chip active" id="model_nvidia" onclick="selectModel('nvidia')">DeepSeek V4 Pro</div>
    <div class="model-chip" id="model_ms" onclick="selectModel('ms')">千问 2.5</div>
  </div>
  <div class="func-bar">
    <div class="func-chip" onclick="insertText('请帮我总结这个网页的内容：')">总结网页</div>
    <div class="func-chip" onclick="insertText('请帮我把 和 网站进行对比')">对比网页</div>
    <div class="func-chip" onclick="insertText('帮我搜索最新新闻')">搜索信息</div>
    <div class="func-chip" onclick="insertText('帮我写一段代码')">写代码</div>
  </div>
  <div class="input-row">
    <textarea class="input-field" id="inputField" rows="1" placeholder="输入消息或网址..." oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    <button class="i-btn" onclick="attachUrl()" title="附加当前网址">
      <svg viewBox="0 0 24 24"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>
    </button>
    <button class="i-btn send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
// ========== 状态 ==========
var conversationHistory = [];
var currentChatId = '';
var isLoading = false;
var HISTORY_KEY = 'ai_chat_history';
var MAX_CONTEXT = 10;
var selectedModel = 'nvidia'; // 'nvidia' 或 'ms'

// ========== 模型选择 ==========
function selectModel(model) {
  selectedModel = model;
  var chips = document.querySelectorAll('.model-chip');
  for (var i = 0; i < chips.length; i++) chips[i].classList.remove('active');
  document.getElementById('model_' + model).classList.add('active');
}

// ========== 主题 ==========
function toggleTheme() {
  document.body.classList.toggle('dark');
  localStorage.setItem('ai_theme', document.body.classList.contains('dark') ? 'dark' : 'light');
  updateThemeIcon();
}
function updateThemeIcon() {
  var icon = document.getElementById('themeIcon');
  if (document.body.classList.contains('dark')) {
    icon.innerHTML = '<path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1z"/>';
  } else {
    icon.innerHTML = '<path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/>';
  }
}
function initTheme() {
  if (localStorage.getItem('ai_theme') === 'dark') document.body.classList.add('dark');
  updateThemeIcon();
}

// ========== 侧边栏：聊天记录 ==========
function openSidebar() {
  saveChat();
  renderHistory();
  document.getElementById('sidebarOverlay').classList.add('active');
  document.getElementById('sidebar').classList.add('active');
}
function closeSidebar() {
  document.getElementById('sidebarOverlay').classList.remove('active');
  document.getElementById('sidebar').classList.remove('active');
}
function renderHistory() {
  var list = document.getElementById('historyList');
  var chats = getAllChats();
  if (chats.length === 0) {
    list.innerHTML = '<div class="sidebar-empty">暂无聊天记录</div>';
    return;
  }
  var html = '';
  for (var i = 0; i < chats.length; i++) {
    var c = chats[i];
    var isCurrent = c.id === currentChatId;
    html += '<div class="history-item" style="' + (isCurrent ? 'background:var(--bg-secondary)' : '') + '" onclick="loadChat(\'' + c.id + '\')">'
      + '<div class="history-info">'
      + '<div class="history-title">' + escapeHtml(c.title) + '</div>'
      + '<div class="history-date">' + escapeHtml(c.date) + '</div>'
      + '</div>'
      + '<button class="history-del" onclick="event.stopPropagation();deleteChat(\'' + c.id + '\')">'
      + '<svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>'
      + '</button></div>';
  }
  list.innerHTML = html;
}
function getAllChats() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch(e) { return []; }
}
function saveAllChats(chats) {
  if (chats.length > 30) chats.length = 30;
  localStorage.setItem(HISTORY_KEY, JSON.stringify(chats));
}
function saveChat() {
  if (conversationHistory.length === 0) return;
  var chats = getAllChats();
  var title = '新对话';
  for (var i = 0; i < conversationHistory.length; i++) {
    if (conversationHistory[i].role === 'user') {
      title = conversationHistory[i].content.substring(0, 40);
      break;
    }
  }
  var now = new Date();
  var dateStr = now.getFullYear() + '/' + (now.getMonth()+1) + '/' + now.getDate() + ' ' + pad(now.getHours()) + ':' + pad(now.getMinutes());
  var chat = { id: currentChatId, title: title, date: dateStr, messages: conversationHistory };
  var found = false;
  for (var j = 0; j < chats.length; j++) {
    if (chats[j].id === currentChatId) { chats[j] = chat; found = true; break; }
  }
  if (!found) chats.unshift(chat);
  saveAllChats(chats);
}
function loadChat(id) {
  saveChat();
  var chats = getAllChats();
  for (var i = 0; i < chats.length; i++) {
    if (chats[i].id === id) {
      currentChatId = id;
      conversationHistory = chats[i].messages || [];
      document.getElementById('msgList').innerHTML = '';
      if (conversationHistory.length > 0) {
        document.getElementById('welcome').style.display = 'none';
        for (var j = 0; j < conversationHistory.length; j++) {
          var m = conversationHistory[j];
          addMessage(m.role === 'user' ? 'user' : 'ai', m.content, false);
        }
      } else {
        document.getElementById('welcome').style.display = 'block';
      }
      closeSidebar();
      scrollBottom();
      return;
    }
  }
}
function deleteChat(id) {
  var chats = getAllChats();
  var newChats = [];
  for (var i = 0; i < chats.length; i++) {
    if (chats[i].id !== id) newChats.push(chats[i]);
  }
  saveAllChats(newChats);
  if (id === currentChatId) {
    newChat();
  }
  renderHistory();
}
function newChat() {
  saveChat();
  currentChatId = 'chat_' + Date.now();
  conversationHistory = [];
  document.getElementById('msgList').innerHTML = '';
  document.getElementById('welcome').style.display = 'block';
  closeSidebar();
}
function clearCurrentChat() {
  conversationHistory = [];
  document.getElementById('msgList').innerHTML = '';
  document.getElementById('welcome').style.display = 'block';
  // 从历史中删除当前对话
  var chats = getAllChats();
  var newChats = [];
  for (var i = 0; i < chats.length; i++) {
    if (chats[i].id !== currentChatId) newChats.push(chats[i]);
  }
  saveAllChats(newChats);
}
function pad(n) { return n < 10 ? '0' + n : '' + n; }
function escapeHtml(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ========== 聊天UI ==========
function scrollBottom() {
  setTimeout(function() {
    var el = document.getElementById('chatBox');
    el.scrollTop = el.scrollHeight;
  }, 60);
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function insertText(text) {
  var el = document.getElementById('inputField');
  el.value = text;
  el.focus();
  autoResize(el);
}
function attachUrl() {
  try {
    YulanApp.getCurrentUrl();
  } catch(e) {}
}

// ========== 发送消息 ==========
function sendMessage() {
  if (isLoading) return;
  var el = document.getElementById('inputField');
  var text = el.value.trim();
  if (!text) return;
  el.value = '';
  el.style.height = 'auto';
  document.getElementById('welcome').style.display = 'none';

  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  // 提取域名/网址
  var domains = extractDomains(text);
  if (domains.length > 0) {
    processDomains(domains, text);
  } else {
    chatWithAI(text);
  }
}

// ========== 提取域名和网址 ==========
function extractDomains(text) {
  var results = [];

  // 完整URL（带协议头）
  var urlReg = /https?:\/\/[^\s\u4e00-\u9fff]+/gi;
  var urls = text.match(urlReg) || [];
  for (var i = 0; i < urls.length; i++) {
    var u = urls[i].replace(/[。，,；;！!？?\u3000]+$/, '');
    if (results.indexOf(u) === -1) results.push(u);
  }

  // 对比模式：请帮我把 domain1 和 domain2 和 domain3 网站进行对比
  var cmpMatch = text.match(/请帮我把\s+(.+?)\s+网站进行对比/);
  if (cmpMatch) {
    var parts = cmpMatch[1].split(/[和、，,\s]+/);
    for (var j = 0; j < parts.length; j++) {
      var d = parts[j].trim().replace(/[。，,]+$/, '');
      if (d.length > 0 && d.indexOf('.') > 0) {
        var full = d.indexOf('http') === 0 ? d : ('https://' + d);
        if (results.indexOf(full) === -1) results.push(full);
      }
    }
  }

  // 其他场景中的裸域名（总结/分析等关键词时）
  if (results.length === 0 && /总结|摘要|看看|分析|了解|打开/.test(text)) {
    var bareReg = /([a-zA-Z0-9][-a-zA-Z0-9]*\.)+[a-zA-Z]{2,}/g;
    var bares = text.match(bareReg) || [];
    for (var k = 0; k < bares.length; k++) {
      var bd = bares[k].replace(/[。，,；;！!？?]+$/, '');
      if (bd.length > 3 && bd.indexOf('.') > 0) {
        var bf = 'https://' + bd;
        if (results.indexOf(bf) === -1) results.push(bf);
      }
    }
  }

  return results;
}

// ========== Java桥接全局回调函数 ==========
// Java端处理完后通过 evaluateJavascript 调用这些全局函数

// AI对话回调
window._onChatResult = function(result) {
  hideTyping();
  if (result && result.length > 0) {
    addMessage('ai', result);
    conversationHistory.push({ role: 'assistant', content: result });
    saveChat();
  } else {
    addMessage('ai', '暂时无法回答，请稍后重试');
  }
};

// 网址处理回调（总结/对比）
window._onProcessUrlsResult = function(result) {
  hideTyping();
  if (result && result.length > 0) {
    addMessage('ai', result);
    conversationHistory.push({ role: 'assistant', content: result });
    saveChat();
  } else {
    addMessage('ai', '处理失败，请稍后重试');
  }
};

// 获取当前URL回调
window._onCurrentUrlResult = function(url) {
  if (url && url.length > 0) {
    var el = document.getElementById('inputField');
    el.value = el.value.trim() + ' ' + url;
    autoResize(el);
  }
};

// ========== 通过Java桥接处理网址（总结/对比）==========
function processDomains(domains, userMsg) {
  showTyping();
  try {
    var urlList = JSON.stringify(domains);
    YulanApp.processUrls(urlList, userMsg, selectedModel);
  } catch(e) {
    hideTyping();
    addMessage('ai', '调用失败：' + e.message);
  }
}

// ========== 通过Java桥接进行AI对话（修复Failed to fetch）==========
function chatWithAI(userMsg) {
  showTyping();

  // 构建消息列表（含系统提示 + 最近对话上下文）
  var sysPrompt = '你是一个专业、友好的AI助手，请用简体中文回答用户的问题。回答要简洁、准确、有帮助。如果用户问的是新闻、时事或实时信息，你可以基于已有知识回答，但应说明信息可能不是最新的。如果不确定，请如实说明。';
  var msgs = [{ role: 'system', content: sysPrompt }];
  var start = Math.max(0, conversationHistory.length - MAX_CONTEXT * 2);
  for (var i = start; i < conversationHistory.length; i++) {
    msgs.push(conversationHistory[i]);
  }

  try {
    YulanApp.chatWithAI(JSON.stringify(msgs), selectedModel);
  } catch(e) {
    hideTyping();
    addMessage('ai', '调用失败：' + e.message);
  }
}

// ========== UI渲染 ==========
function addMessage(type, content, doScroll) {
  if (doScroll === undefined) doScroll = true;
  var list = document.getElementById('msgList');
  var div = document.createElement('div');
  div.className = 'msg ' + type;

  var avSvg = type === 'ai'
    ? '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>'
    : '<svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>';

  div.innerHTML = '<div class="msg-av">' + avSvg + '</div><div class="msg-body"><div class="msg-bubble"></div></div>';
  div.querySelector('.msg-bubble').textContent = content;
  list.appendChild(div);
  if (doScroll) scrollBottom();
}

function showTyping() {
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  var list = document.getElementById('msgList');
  var div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typingMsg';
  div.innerHTML = '<div class="msg-av"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg></div>'
    + '<div class="msg-body"><div class="msg-bubble"><div class="typing"><i></i><i></i><i></i></div></div></div>';
  list.appendChild(div);
  scrollBottom();
}
function hideTyping() {
  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  var el = document.getElementById('typingMsg');
  if (el) el.remove();
}
