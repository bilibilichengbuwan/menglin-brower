<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>梦林浏览器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
}
body {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: #ffffff;
    color: #1a1a1a;
    animation: fade 0.5s ease-out;
}
body.dark {
    background: #1f1f1f;
    color: #f2f2f7;
}
@keyframes fade {
    0% { opacity: 0; transform: translateY(6px); }
    100% { opacity: 1; transform: translateY(0); }
}
.logo {
    width: 112px; height: 112px;
    border-radius: 30px;
    background: linear-gradient(135deg, #0a84ff 0%, #5fb0ff 100%);
    display: flex; align-items: center; justify-content: center;
    color: #ffffff; font-size: 60px; font-weight: 700; letter-spacing: -1px;
    margin-bottom: 32px;
    box-shadow: 0 8px 32px rgba(10, 132, 255, 0.35);
}
.name {
    font-size: 24px;
    font-weight: 600;
    letter-spacing: 4px;
    margin-bottom: 8px;
}
.sub {
    font-size: 12px;
    color: #8e8e93;
    letter-spacing: 2px;
    margin-bottom: 72px;
}
.bar {
    width: 180px;
    height: 2px;
    background: #e8e8ed;
    border-radius: 2px;
    position: relative;
    overflow: hidden;
}
body.dark .bar { background: #3a3a3c; }
.bar::after {
    content: "";
    position: absolute;
    left: 0; top: 0;
    width: 28%; height: 100%;
    background: linear-gradient(90deg, #0a84ff, #5fb0ff);
    border-radius: 2px;
    animation: move 1.2s ease-in-out infinite;
}
@keyframes move {
    0% { transform: translateX(-120%); }
    100% { transform: translateX(380%); }
}
.tag {
    margin-top: 40px;
    font-size: 11px;
    color: #8e8e93;
    letter-spacing: 2px;
    opacity: 0.8;
}
</style>
</head>
<body>
<div class="logo">梦</div>
<div class="name">梦林浏览器</div>
<div class="sub">Menglin Browser</div>
<div class="bar"></div>
<div class="tag">开源 · 简洁 · 快速</div>
<script>
(function(){
    // 简单根据时间/系统来切换深色模式
    // 由于WebView背景已处理了背景色
    var m = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)');
    if (m && m.matches) {
        document.body.classList.add('dark');
    }
})();
</script>
</body>
</html>
