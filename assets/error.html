<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>无法连接</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif; }
body {
    background: linear-gradient(180deg, #E8F1FF 0%, #F2F2F7 100%);
    color: #1C1C1E;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
}
@media (prefers-color-scheme: dark) {
    body { background: linear-gradient(180deg, #0A1A2F 0%, #1A1A1A 100%); color: #FFFFFF; }
    .card { background: rgba(45,45,45,0.9) !important; border-color: #3A3A3A !important; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    .subtitle, .err-detail { color: rgba(255,255,255,0.7) !important; }
    .err-box { background: rgba(0,0,0,0.4) !important; color: #FF6B6B !important; border-color: rgba(255,107,107,0.3) !important; }
    .btn-secondary { background: rgba(58,58,58,0.9) !important; color: #FFFFFF !important; }
}
body.dark-applied { background: linear-gradient(180deg, #0A1A2F 0%, #1A1A1A 100%) !important; color: #FFFFFF !important; }
body.dark-applied .card { background: rgba(45,45,45,0.9) !important; border-color: #3A3A3A !important; }
body.dark-applied .subtitle, body.dark-applied .err-detail { color: rgba(255,255,255,0.7) !important; }
body.dark-applied .err-box { background: rgba(0,0,0,0.4) !important; color: #FF6B6B !important; border-color: rgba(255,107,107,0.3) !important; }
body.dark-applied .btn-secondary { background: rgba(58,58,58,0.9) !important; color: #FFFFFF !important; }
body.light-applied { background: linear-gradient(180deg, #E8F1FF 0%, #F2F2F7 100%) !important; color: #1C1C1E !important; }

.card {
    width: 100%;
    max-width: 360px;
    background: rgba(255,255,255,0.9);
    border: 1px solid rgba(229,229,234,0.6);
    border-radius: 22px;
    padding: 36px 24px 28px 24px;
    text-align: center;
    box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
}
.icon {
    width: 72px;
    height: 72px;
    margin: 0 auto 20px auto;
    border-radius: 20px;
    background: linear-gradient(135deg, #007AFF, #1E88E5);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #FFFFFF;
    font-size: 36px;
    font-weight: 300;
}
.title {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 8px;
}
.subtitle {
    font-size: 14px;
    color: #8E8E93;
    margin-bottom: 12px;
    line-height: 1.5;
}
.err-box {
    background: rgba(0,0,0,0.06);
    border: 1px solid rgba(0,0,0,0.1);
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 24px;
    text-align: left;
}
.err-label {
    font-size: 11px;
    color: #8E8E93;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}
.err-detail {
    font-size: 12px;
    color: #FF6B6B;
    word-break: break-all;
    line-height: 1.4;
}
.btns {
    display: flex;
    flex-direction: column;
    gap: 10px;
}
.btn {
    width: 100%;
    height: 46px;
    border-radius: 22px;
    border: none;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: transform 0.1s;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: #1E88E5; color: #FFFFFF; }
.btn-secondary { background: rgba(242,242,247,0.85); color: #1C1C1E; }
</style>
</head>
<body>
<div class="card">
    <div class="icon">!</div>
    <div class="title">无法连接到此网站</div>
    <div class="subtitle">请检查网络连接后重试</div>
    <div class="err-box">
        <div class="err-label">错误详情</div>
        <div class="err-detail" id="errDetail">未知错误</div>
    </div>
    <div class="btns">
        <button class="btn btn-primary" onclick="location.reload()">刷新页面</button>
        <button class="btn btn-secondary" onclick="location.href='homepage.html'">返回主页</button>
    </div>
</div>
<script>
(function(){
    if (typeof window.__YULAN_DARK__ !== 'undefined') {
        if (window.__YULAN_DARK__ === true) {
            document.body.classList.add('dark-applied');
        } else {
            document.body.classList.add('light-applied');
        }
    }
    // 从URL参数获取错误信息
    var params = new URLSearchParams(location.search);
    var errCode = params.get('code');
    var errMsg = params.get('msg');
    var errUrl = params.get('url');
    var detail = '';
    if (errUrl) {
        detail = '网址: ' + errUrl;
    }
    if (errMsg) {
        detail += (detail ? '\n' : '') + '原因: ' + decodeURIComponent(errMsg);
    } else if (errCode) {
        var errNames = {
            'ERROR_HOST_LOOKUP': '服务器DNS解析失败',
            'ERROR_CONNECT': '无法连接到服务器',
            'ERROR_TIMEOUT': '连接超时',
            'ERROR_ssl_handshake_failed': 'SSL证书验证失败',
            'ERROR_PROXY_AUTH': '代理服务器认证失败',
            'ERROR_FILE_NOT_FOUND': '文件未找到',
            'ERROR_TOO_MANY_REQUESTS': '请求过于频繁',
            'net::ERR_INTERNET_DISCONNECTED': '网络已断开',
            'net::ERR_CONNECTION_TIMED_OUT': '连接超时',
            'net::ERR_CONNECTION_REFUSED': '连接被拒绝',
            'net::ERR_NAME_NOT_RESOLVED': 'DNS解析失败',
            'net::ERR_NETWORK_CHANGED': '网络已更改'
        };
        var name = errNames[errCode] || errCode;
        detail += (detail ? '\n' : '') + '错误: ' + name;
    }
    if (!detail) detail = '网络连接失败，请检查网络设置';
    document.getElementById('errDetail').textContent = detail;
})();
</script>
</body>
</html>
